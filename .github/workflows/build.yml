name: Build and Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build and Bundle
        run: |
          chmod +x scripts/bundle.sh
          ./scripts/bundle.sh

      - name: Package
        run: |
          cd .build/release
          zip -r "VoiceInput-${{ github.ref_name }}-arm64.zip" VoiceInput.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/release/VoiceInput-*.zip
          generate_release_notes: true
